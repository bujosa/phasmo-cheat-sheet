server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip text assets for faster loads
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/manifest+json font/ttf font/woff font/woff2;

    # The app cache-busts changed assets with ?v=forkNN query strings, so static
    # files can be cached aggressively while index.html stays fresh.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(?:css|js|json|png|jpe?g|gif|svg|ico|webp|ttf|woff2?|eot|mp3|wav|ogg|glb)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # don't serve VCS / tooling if they ever sneak into the image
    location ~ /\.(git|server) { deny all; }
}
