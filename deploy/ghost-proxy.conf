# Reverse proxy del homelab — dueño del puerto 80, enruta por nombre de host.
# ghost.home → contenedor "phasmo". Para añadir otra app .home en el futuro,
# basta con otro bloque server { server_name otra.home; proxy_pass http://otra; }.

upstream phasmo_app {
    server phasmo:80;
}

server {
    listen      80 default_server;
    listen [::]:80 default_server;
    server_name ghost.home;

    # logs al stdout/stderr del contenedor (docker logs ghost-proxy)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    location / {
        proxy_pass         http://phasmo_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
