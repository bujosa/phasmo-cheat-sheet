# ghost.home → Phasmo Cheat Sheet en ser9 (10.0.0.12:48123)
#
# Se instala en el nginx-proxy-manager de la Pi como
#   /data/nginx/custom/http.conf
# que NPM incluye dentro de su bloque http{} y NUNCA sobreescribe (punto de
# extensión oficial, no hace falta la UI ni credenciales del NPM).
#
# Flujo:  ghost.home (Pi-hole → 10.0.0.17) → NPM → http://10.0.0.12:48123 (la app)
#
# Aplicar:  make deploy-npm
server {
    listen 80;
    listen [::]:80;
    server_name ghost.home;

    location / {
        proxy_pass http://10.0.0.12:48123;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }
}
